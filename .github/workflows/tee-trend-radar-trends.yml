# 自动拉取 Google Trends 并提交 public/trends.json（需将本仓库推送到 GitHub 并在 Actions 中允许写入）
name: Tee trend radar — refresh trends

on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 14:00 左右（约美东上午）
    - cron: "0 14 * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: tee-trend-radar-trends
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tee-trend-radar

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install & fetch
        run: |
          npm install
          npm run update-data

      - name: Commit trends.json
        id: commit_trends
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tee-trend-radar/public/trends.json
          if git diff --staged --quiet; then
            echo "No changes to trends.json"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(tee-trend-radar): refresh Google Trends snapshot"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit_trends.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-tee-trend-pages.yml --ref main
